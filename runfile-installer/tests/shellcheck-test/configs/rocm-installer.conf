# ShellCheck Configuration for ROCm Installer
# Dynamically locates the runfile-installer directory for analysis

# Determine paths relative to config file location
CONFIG_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
SHELLCHECK_TEST_DIR="$(dirname "$CONFIG_DIR")"

# Find the runfile-installer directory dynamically
# Priority: 1) RUNFILE_INSTALLER_DIR env var, 2) Search from shellcheck-test location
if [[ -n "$RUNFILE_INSTALLER_DIR" ]]; then
    INSTALLER_DIR="$RUNFILE_INSTALLER_DIR"
    echo "[INFO] Using RUNFILE_INSTALLER_DIR from environment: $INSTALLER_DIR"
else
    echo "[INFO] Searching for runfile-installer directory..."

    # Search upward from shellcheck-test directory for runfile-installer
    SEARCH_START="$SHELLCHECK_TEST_DIR"
    INSTALLER_DIR=""

    # Search up to 4 levels up from current location
    for i in {1..4}; do
        SEARCH_START="$(dirname "$SEARCH_START")"

        # Look for runfile-installer directory with expected structure
        FOUND_INSTALLER=$(find "$SEARCH_START" -maxdepth 2 -type d -name "runfile-installer" 2>/dev/null | while read -r installer_path; do
            # Verify it has the expected subdirectories
            if [[ -d "$installer_path/build-installer" ]] && [[ -d "$installer_path/rocm-installer" ]]; then
                echo "$installer_path"
                break
            fi
        done | head -1)

        if [[ -n "$FOUND_INSTALLER" ]]; then
            INSTALLER_DIR="$FOUND_INSTALLER"
            break
        fi
    done

    if [[ -z "$INSTALLER_DIR" ]]; then
        echo "[ERROR] Could not locate runfile-installer directory!"
        echo "[ERROR] Please set RUNFILE_INSTALLER_DIR environment variable to the runfile-installer path."
        echo "[ERROR] Example: export RUNFILE_INSTALLER_DIR=/path/to/runfile-installer"
        echo "[ERROR] The directory should contain 'build-installer' and 'rocm-installer' subdirectories"
        exit 1
    fi

    echo "[INFO] Found runfile-installer at: $INSTALLER_DIR"
fi

# Verify the installer directory exists and contains expected structure
if [[ ! -d "$INSTALLER_DIR/build-installer" ]] || [[ ! -d "$INSTALLER_DIR/rocm-installer" ]]; then
    echo "[ERROR] Invalid installer directory: missing build-installer or rocm-installer subdirectories"
    echo "[ERROR] Path: $INSTALLER_DIR"
    exit 1
fi

# Source directory to scan for bash scripts
SOURCE_DIR="$INSTALLER_DIR"

# Project name (used for results naming)
PROJECT_NAME="rocm-installer"

# Working directory (where results are stored)
# Default: current directory, but can be overridden
# WORK_DIR="/tmp/shellcheck-work"

# Exclude patterns (paths to skip during scan)
# Exclude test directories, build artifacts, and hidden directories
EXCLUDE_PATTERNS=(
    "*/.*/*"                            # Hidden directories (.git, .claude, etc.)
    "$INSTALLER_DIR/tests/codeql-test/*"     # CodeQL analysis tests
    "$INSTALLER_DIR/tests/shellcheck-test/*" # ShellCheck analysis tests (self)
    "*/build/*"                         # Build output directories
    "*/build-UI/*"                      # UI build directories
    "*/build-installer/build/*"         # Installer build artifacts
)

# Auto-install shellcheck and jq if not found (default: true)
AUTO_INSTALL=true
