# Example ShellCheck Configuration File
# Copy this file and customize for your project

# Source directory to scan for bash scripts (required)
SOURCE_DIR="/path/to/your/scripts"

# Project name for results naming (required)
PROJECT_NAME="myproject"

# Working directory where results are stored (optional)
# If not specified, uses current directory where you run the script
# WORK_DIR="/tmp/shellcheck-work"

# Exclude patterns (optional)
# Paths matching these patterns will be skipped during scan
EXCLUDE_PATTERNS=(
    "*/test/*"
    "*/build/*"
    "*/.git/*"
    "*/node_modules/*"
)

# Auto-install shellcheck and jq if not found (default: true)
# Set to false if you don't want automatic installation attempts
AUTO_INSTALL=true

# Example configurations for different project types:

# Example 1: Simple script directory
# SOURCE_DIR="/home/user/myscripts"
# PROJECT_NAME="myscripts"

# Example 2: Web project with exclusions
# SOURCE_DIR="/home/user/webapp"
# PROJECT_NAME="webapp"
# EXCLUDE_PATTERNS=("*/node_modules/*" "*/dist/*" "*/build/*")

# Example 3: System scripts
# SOURCE_DIR="/usr/local/bin"
# PROJECT_NAME="system-scripts"
# WORK_DIR="/tmp/shellcheck-results"
