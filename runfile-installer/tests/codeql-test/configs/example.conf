# Example CodeQL Configuration File
# Copy this file and customize for your project

# Source code directory to analyze (required)
SOURCE_DIR="/path/to/your/source"

# Build command that compiles your project (required)
# This command will be traced by CodeQL to build the database
BUILD_CMD="cd /path/to/build && make clean && make"

# Project name for database and results naming (required)
PROJECT_NAME="myproject"

# Language to analyze (default: cpp)
# Supported: cpp, java, javascript, python, go, ruby, csharp
LANGUAGE="cpp"

# Working directory where CodeQL database and results are stored (optional)
# If not specified, uses current directory where you run the script
# WORK_DIR="/tmp/codeql-work"

# Custom query suite file (optional)
# Path to .qls file with custom CodeQL queries
# CUSTOM_QUERY_FILE="/path/to/custom-queries.qls"

# CodeQL bundle location (optional)
# If not specified, will look in script directory or auto-download
# CODEQL_BUNDLE="/path/to/codeql-bundle-linux64.tar.gz"

# Example configurations for different project types:

# Example 1: Simple Makefile project
# SOURCE_DIR="/home/user/myproject/src"
# BUILD_CMD="cd /home/user/myproject && make clean && make"
# PROJECT_NAME="myproject"

# Example 2: CMake project
# SOURCE_DIR="/home/user/myapp/src"
# BUILD_CMD="cd /home/user/myapp/build && cmake .. && make clean && make"
# PROJECT_NAME="myapp"

# Example 3: Autotools project
# SOURCE_DIR="/home/user/mytool"
# BUILD_CMD="cd /home/user/mytool && ./configure && make clean && make"
# PROJECT_NAME="mytool"
