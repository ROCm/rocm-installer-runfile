# CodeQL Configuration for ROCm Installer UI
# Dynamically locates the UI directory containing C/C++ source code

# Determine paths relative to config file location
CONFIG_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
CODEQL_TEST_DIR="$(dirname "$CONFIG_DIR")"

# Find the UI source directory dynamically
# Priority: 1) ROCM_UI_DIR env var, 2) Search from codeql-test location
if [[ -n "$ROCM_UI_DIR" ]]; then
    UI_DIR="$ROCM_UI_DIR"
    echo "[INFO] Using ROCM_UI_DIR from environment: $UI_DIR"
else
    echo "[INFO] Searching for UI directory with C/C++ source files..."

    # Search upward from codeql-test directory for UI/src directory
    SEARCH_START="$CODEQL_TEST_DIR"
    UI_DIR=""

    # Search up to 4 levels up from current location
    for i in {1..4}; do
        SEARCH_START="$(dirname "$SEARCH_START")"

        # Look for UI directory with src subdirectory containing .c or .cpp files
        FOUND_UI=$(find "$SEARCH_START" -maxdepth 3 -type d -name "UI" 2>/dev/null | while read -r ui_path; do
            if [[ -d "$ui_path/src" ]]; then
                # Check for .c or .cpp files (either is sufficient)
                if find "$ui_path/src" -maxdepth 1 -name "*.c" -o -name "*.cpp" 2>/dev/null | grep -q .; then
                    echo "$ui_path"
                    break
                fi
            fi
        done | head -1)

        if [[ -n "$FOUND_UI" ]]; then
            UI_DIR="$FOUND_UI"
            break
        fi
    done

    if [[ -z "$UI_DIR" ]]; then
        echo "[ERROR] Could not locate UI directory with C/C++ source files!"
        echo "[ERROR] Please set ROCM_UI_DIR environment variable to the UI directory path."
        echo "[ERROR] Example: export ROCM_UI_DIR=/path/to/runfile-installer/UI"
        echo "[ERROR] The UI directory should contain a 'src' subdirectory with .c/.cpp files"
        exit 1
    fi

    echo "[INFO] Found UI directory at: $UI_DIR"
fi

# Verify the UI directory exists and contains expected structure
if [[ ! -d "$UI_DIR/src" ]]; then
    echo "[ERROR] Invalid UI directory: src subdirectory not found at $UI_DIR/src"
    exit 1
fi

if ! find "$UI_DIR/src" -maxdepth 1 -name "*.c" -o -name "*.cpp" 2>/dev/null | grep -q .; then
    echo "[ERROR] No C/C++ source files found in $UI_DIR/src"
    exit 1
fi

# Source code location
SOURCE_DIR="$UI_DIR"
# Parent directory (contains UI, build-installer, etc.)
INSTALLER_DIR="$(dirname "$UI_DIR")"

# Build command - builds the UI using CMake
BUILD_CMD="mkdir -p $INSTALLER_DIR/build-UI && cd $INSTALLER_DIR/build-UI && cmake -DINSTALLER_NAME='rocm-installer-test' -DAMDGPU_DKMS='' $INSTALLER_DIR/build-installer && make clean && make"

# Project name (used for database naming)
PROJECT_NAME="rocm-ui"

# Language to analyze
LANGUAGE="cpp"

# Working directory (where CodeQL database and results are stored)
# Default: current directory, but can be overridden
# WORK_DIR="/tmp/codeql-work"

# Custom query suite (optional)
# AMD Must-Fix query suite - critical security and quality checks
CUSTOM_QUERY_FILE="$CODEQL_TEST_DIR/suites/amd-cpp-must-fix.qls"

# CodeQL bundle location (optional - will auto-download if not specified)
# CODEQL_BUNDLE="/path/to/codeql-bundle-linux64.tar.gz"
